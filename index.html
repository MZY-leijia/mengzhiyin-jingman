<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>漫境·追番 - 云端同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:white;padding:10px 24px;border-radius:40px;z-index:9999;opacity:0;transition:0.2s;pointer-events:none}
        .toast.show{opacity:1}
        .page{display:none}
        .page.active{display:block}
        .bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:white;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
        .nav-item{flex:1;text-align:center;padding:8px 0;cursor:pointer;color:#6b7280}
        .nav-item.active{color:#dc2626}
        .anime-card{cursor:pointer;background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);transition:transform 0.2s}
        .anime-card:active{transform:scale(0.97)}
        .anime-card img{width:100%;aspect-ratio:3/4;object-fit:cover}
        .cloud-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- 首页 -->
<div id="homePage" class="page active">
    <div class="bg-white p-4 sticky top-0 shadow-sm z-10">
        <h1 class="text-xl font-bold text-center">🎬 漫境·追番</h1>
    </div>
    <div class="p-4 pb-20">
        <!-- 云端同步卡片 -->
        <div class="cloud-card rounded-2xl p-4 text-white mb-4 shadow-lg">
            <div class="flex justify-between items-center">
                <div>
                    <p class="font-bold">☁️ 云端同步</p>
                    <p class="text-xs opacity-80">换设备时一键备份/恢复</p>
                </div>
                <div class="flex gap-2">
                    <button id="cloudBackupBtn" class="bg-white/20 backdrop-blur px-3 py-1.5 rounded-xl text-sm font-medium">💾 备份</button>
                    <button id="cloudRestoreBtn" class="bg-white/20 backdrop-blur px-3 py-1.5 rounded-xl text-sm font-medium">📥 恢复</button>
                </div>
            </div>
            <div id="cloudStatus" class="text-xs mt-2 text-center hidden"></div>
            <div id="lastBackupInfo" class="text-xs text-white/50 mt-2 text-center"></div>
        </div>
        
        <!-- 用户信息卡片 -->
        <div class="bg-gradient-to-r from-amber-500 to-orange-500 rounded-2xl p-4 mb-4 text-white">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-sm opacity-90">我的金币</p>
                    <p class="text-3xl font-bold" id="coinDisplay">0</p>
                </div>
                <button id="checkinBtn" class="bg-white/20 backdrop-blur px-4 py-2 rounded-xl text-sm font-medium">🎁 签到</button>
            </div>
            <div class="flex justify-between mt-2 text-sm">
                <span>📊 连续签到: <span id="streakDisplay">0</span>天</span>
                <span>⭐ 追番: <span id="favCountDisplay">0</span>部</span>
            </div>
        </div>
        
        <!-- 动漫列表 -->
        <h2 class="font-bold text-lg mb-3">🔥 热门推荐</h2>
        <div class="grid grid-cols-2 gap-3" id="animeGrid"></div>
    </div>
</div>

<!-- 用户页 -->
<div id="userPage" class="page">
    <div class="bg-white p-4 sticky top-0 shadow-sm flex items-center gap-3">
        <i class="fa-solid fa-arrow-left text-xl cursor-pointer back-home"></i>
        <h1 class="text-xl font-bold">我的</h1>
    </div>
    <div class="p-4 text-center pb-20">
        <div class="w-24 h-24 bg-gradient-to-br from-red-400 to-pink-500 rounded-full mx-auto flex items-center justify-center text-5xl shadow-lg" id="avatarDisplay">😊</div>
        <h2 class="text-xl font-bold mt-3" id="userName">未登录</h2>
        <div class="flex justify-center gap-6 mt-3">
            <div class="text-center">
                <p class="text-2xl font-bold text-red-500" id="userFavCount">0</p>
                <p class="text-xs text-gray-500">追番</p>
            </div>
            <div class="text-center">
                <p class="text-2xl font-bold text-amber-500" id="userCoinDisplay">0</p>
                <p class="text-xs text-gray-500">金币</p>
            </div>
            <div class="text-center">
                <p class="text-2xl font-bold text-blue-500" id="userStreakDisplay">0</p>
                <p class="text-xs text-gray-500">连续签到</p>
            </div>
        </div>
        <div class="mt-6 space-y-2">
            <div class="bg-gray-100 rounded-xl py-3 cursor-pointer goto-login hover:bg-gray-200 transition" id="loginBtnArea">
                <i class="fa-solid fa-right-to-bracket mr-2"></i> 登录/注册
            </div>
            <div class="bg-gray-100 rounded-xl py-3 cursor-pointer hover:bg-gray-200 transition" id="logoutBtnArea" style="display:none">
                <i class="fa-solid fa-sign-out-alt mr-2"></i> 退出登录
            </div>
        </div>
        <p class="text-xs text-gray-400 mt-4">💡 提示：点击「备份」保存数据到云端，换设备后点「恢复」即可同步</p>
    </div>
</div>

<!-- 登录页 -->
<div id="loginPage" class="page">
    <div class="min-h-screen flex items-center justify-center p-4 bg-gray-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
            <div class="text-center mb-4">
                <i class="fa-solid fa-film text-red-500 text-5xl"></i>
                <h2 class="text-2xl font-bold mt-2">登录账号</h2>
            </div>
            <input id="loginUsername" placeholder="用户名" class="w-full border rounded-xl p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-red-400">
            <input id="loginPassword" type="password" placeholder="密码" class="w-full border rounded-xl p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-red-400">
            <button id="loginBtn" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold">登 录</button>
            <p class="text-center mt-4 text-sm text-gray-500">
                没有账号？ <span class="text-red-500 font-semibold cursor-pointer goto-register">注册新账号</span>
            </p>
        </div>
    </div>
</div>

<!-- 注册页 -->
<div id="registerPage" class="page">
    <div class="min-h-screen flex items-center justify-center p-4 bg-gray-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-plus text-red-500 text-5xl"></i>
                <h2 class="text-2xl font-bold mt-2">注册账号</h2>
                <p class="text-xs text-gray-400 mt-1">注册即送100金币</p>
            </div>
            <input id="regUsername" placeholder="用户名" class="w-full border rounded-xl p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-red-400">
            <input id="regPassword" type="password" placeholder="密码（至少3位）" class="w-full border rounded-xl p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-red-400">
            <input id="regConfirm" type="password" placeholder="确认密码" class="w-full border rounded-xl p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-red-400">
            <button id="registerBtn" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold">注 册</button>
            <p class="text-center mt-4 text-sm text-gray-500">
                已有账号？ <span class="text-red-500 font-semibold cursor-pointer goto-login">去登录</span>
            </p>
        </div>
    </div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
    <div class="nav-item active" data-page="homePage">
        <i class="fa-solid fa-house text-xl"></i>
        <p class="text-xs">首页</p>
    </div>
    <div class="nav-item" data-page="userPage">
        <i class="fa-regular fa-user text-xl"></i>
        <p class="text-xs">我的</p>
    </div>
</div>

<script>
// ==================== ✅ 已配置 JSONBin.io API Key ====================
const JSONBIN_API_KEY = '$2a$10$beNRpdGIjxxT4oNzxwy/WOovBLVYQD6V3TFnU5yEIv71laOwm0Q6W';

// ==================== 动漫数据库 ====================
const animeDB = [
    { id:1, title:'葬送的芙莉莲', category:'日漫', episode:'更新至28话', rating:9.9, cover:'https://picsum.photos/400/533?random=1' },
    { id:2, title:'间谍过家家', category:'日漫', episode:'更新至37话', rating:9.3, cover:'https://picsum.photos/400/533?random=2' },
    { id:3, title:'咒术回战', category:'日漫', episode:'更新至47话', rating:9.2, cover:'https://picsum.photos/400/533?random=3' },
    { id:4, title:'鬼灭之刃', category:'日漫', episode:'全44话', rating:9.5, cover:'https://picsum.photos/400/533?random=4' },
    { id:5, title:'海贼王', category:'日漫', episode:'更新中', rating:9.8, cover:'https://picsum.photos/400/533?random=5' },
    { id:6, title:'火影忍者', category:'日漫', episode:'全720话', rating:9.7, cover:'https://picsum.photos/400/533?random=6' },
    { id:7, title:'斗罗大陆', category:'国漫', episode:'全263话', rating:9.3, cover:'https://picsum.photos/400/533?random=7' },
    { id:8, title:'一念永恒', category:'国漫', episode:'全52话', rating:8.9, cover:'https://picsum.photos/400/533?random=8' },
    { id:9, title:'完美世界', category:'国漫', episode:'更新至142话', rating:9.1, cover:'https://picsum.photos/400/533?random=9' },
    { id:10, title:'吞噬星空', category:'国漫', episode:'更新至120话', rating:9.0, cover:'https://picsum.photos/400/533?random=10' }
];

// ==================== 全局变量 ====================
let currentUser = null;
let usersDB = [];
let favorites = [];
let watchHistory = [];

// ==================== 工具函数 ====================
function showToast(msg) {
    let toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

function saveToLocal() {
    if (currentUser) {
        localStorage.setItem('manganime_users', JSON.stringify(usersDB));
        localStorage.setItem('manganime_currentUser', JSON.stringify(currentUser));
        localStorage.setItem(`fav_${currentUser.username}`, JSON.stringify(favorites));
        localStorage.setItem(`history_${currentUser.username}`, JSON.stringify(watchHistory));
    }
}

function loadUserData() {
    let stored = localStorage.getItem('manganime_users');
    if (stored) usersDB = JSON.parse(stored);
    let storedUser = localStorage.getItem('manganime_currentUser');
    if (storedUser) {
        currentUser = JSON.parse(storedUser);
        let found = usersDB.find(u => u.username === currentUser.username);
        if (found) currentUser = found;
        favorites = JSON.parse(localStorage.getItem(`fav_${currentUser.username}`) || '[]');
        watchHistory = JSON.parse(localStorage.getItem(`history_${currentUser.username}`) || '[]');
    }
    updateUI();
}

function updateUI() {
    if (currentUser) {
        document.getElementById('userName').innerHTML = currentUser.username;
        document.getElementById('userCoinDisplay').innerText = currentUser.coins || 0;
        document.getElementById('userFavCount').innerText = favorites.length;
        document.getElementById('userStreakDisplay').innerText = currentUser.signStreak || 0;
        document.getElementById('coinDisplay').innerText = currentUser.coins || 0;
        document.getElementById('favCountDisplay').innerText = favorites.length;
        document.getElementById('streakDisplay').innerText = currentUser.signStreak || 0;
        document.getElementById('loginBtnArea').style.display = 'none';
        document.getElementById('logoutBtnArea').style.display = 'block';
    } else {
        document.getElementById('userName').innerHTML = '未登录';
        document.getElementById('userCoinDisplay').innerText = 0;
        document.getElementById('userFavCount').innerText = 0;
        document.getElementById('userStreakDisplay').innerText = 0;
        document.getElementById('coinDisplay').innerText = 0;
        document.getElementById('favCountDisplay').innerText = 0;
        document.getElementById('streakDisplay').innerText = 0;
        document.getElementById('loginBtnArea').style.display = 'block';
        document.getElementById('logoutBtnArea').style.display = 'none';
    }
    renderAnimeList();
}

function renderAnimeList() {
    let grid = document.getElementById('animeGrid');
    if (!grid) return;
    grid.innerHTML = animeDB.map(anime => `
        <div class="anime-card" data-id="${anime.id}">
            <img src="${anime.cover}" loading="lazy">
            <div class="p-2">
                <h3 class="font-bold text-sm truncate">${anime.title}</h3>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-yellow-500 text-xs">⭐ ${anime.rating}</span>
                    <i class="fa-${favorites.includes(anime.id) ? 'solid' : 'regular'} fa-heart text-red-400 fav-icon text-lg" data-id="${anime.id}"></i>
                </div>
            </div>
        </div>
    `).join('');
    
    document.querySelectorAll('.anime-card').forEach(card => {
        card.addEventListener('click', (e) => {
            if (!e.target.classList.contains('fav-icon')) {
                showToast('🎬 播放功能开发中...');
            }
        });
    });
    
    document.querySelectorAll('.fav-icon').forEach(icon => {
        icon.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFav(parseInt(icon.dataset.id));
        });
    });
}

function toggleFav(id) {
    if (!currentUser) { showToast('请先登录'); return; }
    let idx = favorites.indexOf(id);
    if (idx === -1) {
        favorites.push(id);
        showToast('❤️ 已添加到追番');
    } else {
        favorites.splice(idx, 1);
        showToast('💔 已移除追番');
    }
    saveToLocal();
    updateUI();
}

function handleLogin() {
    let username = document.getElementById('loginUsername').value.trim();
    let password = document.getElementById('loginPassword').value;
    if (!username || !password) { showToast('请输入用户名和密码'); return; }
    
    let user = usersDB.find(u => u.username === username && u.password === password);
    if (user) {
        currentUser = { ...user };
        favorites = JSON.parse(localStorage.getItem(`fav_${username}`) || '[]');
        watchHistory = JSON.parse(localStorage.getItem(`history_${username}`) || '[]');
        saveToLocal();
        updateUI();
        showToast(`欢迎回来，${username}！`);
        navigateTo('homePage');
    } else {
        showToast('用户名或密码错误');
    }
}

function handleRegister() {
    let username = document.getElementById('regUsername').value.trim();
    let password = document.getElementById('regPassword').value;
    let confirm = document.getElementById('regConfirm').value;
    
    if (!username || password.length < 3) { showToast('用户名和密码(至少3位)'); return; }
    if (password !== confirm) { showToast('两次密码不一致'); return; }
    if (usersDB.find(u => u.username === username)) { showToast('用户名已存在'); return; }
    
    let newUser = {
        username: username,
        password: password,
        coins: 100,
        avatar: '😊',
        bio: '新番爱好者',
        membership_expire: 0,
        signStreak: 0,
        lastSignDate: '',
        role: 'user'
    };
    usersDB.push(newUser);
    currentUser = newUser;
    favorites = [];
    watchHistory = [];
    saveToLocal();
    updateUI();
    showToast('注册成功！送你100金币');
    navigateTo('homePage');
}

function handleLogout() {
    currentUser = null;
    favorites = [];
    watchHistory = [];
    localStorage.removeItem('manganime_currentUser');
    updateUI();
    showToast('已退出登录');
    navigateTo('homePage');
}

function handleCheckin() {
    if (!currentUser) { showToast('请先登录'); return; }
    let today = new Date().toDateString();
    if (currentUser.lastSignDate === today) { showToast('今天已经签到过了'); return; }
    
    let isConsecutive = currentUser.lastSignDate && (new Date(currentUser.lastSignDate).getTime() + 86400000) >= Date.now();
    let newStreak = isConsecutive ? (currentUser.signStreak || 0) + 1 : 1;
    let reward = newStreak <= 3 ? 10 : 20;
    
    currentUser.coins = (currentUser.coins || 0) + reward;
    currentUser.lastSignDate = today;
    currentUser.signStreak = newStreak;
    saveToLocal();
    updateUI();
    showToast(`签到成功！+${reward}金币，连续${newStreak}天`);
}

// ==================== JSONBin.io 云端同步 ====================
function getUserBinId() {
    if (!currentUser) return null;
    return localStorage.getItem(`jsonbin_id_${currentUser.username}`);
}

function saveUserBinId(binId) {
    if (!currentUser) return;
    localStorage.setItem(`jsonbin_id_${currentUser.username}`, binId);
}

async function backupToCloud() {
    if (!currentUser) { showToast('请先登录'); return; }
    
    const statusDiv = document.getElementById('cloudStatus');
    if (statusDiv) {
        statusDiv.classList.remove('hidden');
        statusDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在备份到云端...';
    }
    
    const backupData = {
        username: currentUser.username,
        version: '1.0',
        timestamp: Date.now(),
        data: {
            coins: currentUser.coins || 0,
            membership_expire: currentUser.membership_expire || 0,
            signStreak: currentUser.signStreak || 0,
            lastSignDate: currentUser.lastSignDate || '',
            avatar: currentUser.avatar || '😊',
            bio: currentUser.bio || '',
            favorites: favorites || [],
            watchHistory: (watchHistory || []).slice(0, 30)
        }
    };
    
    try {
        const existingBinId = getUserBinId();
        let url = 'https://api.jsonbin.io/v3/b';
        let method = 'POST';
        
        if (existingBinId) {
            url = `https://api.jsonbin.io/v3/b/${existingBinId}`;
            method = 'PUT';
        }
        
        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': JSONBIN_API_KEY,
                'X-Bin-Private': 'true'
            },
            body: JSON.stringify(backupData)
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || '备份失败');
        }
        
        const result = await response.json();
        if (!existingBinId && result.metadata?.id) {
            saveUserBinId(result.metadata.id);
        }
        
        if (statusDiv) {
            statusDiv.innerHTML = '✅ 备份成功！可在其他设备恢复';
            setTimeout(() => statusDiv.classList.add('hidden'), 3000);
        }
        showToast('☁️ 云端备份成功！');
        
    } catch (error) {
        console.error('备份失败:', error);
        if (statusDiv) {
            statusDiv.innerHTML = '❌ 备份失败，请检查网络';
            setTimeout(() => statusDiv.classList.add('hidden'), 3000);
        }
        showToast('备份失败: ' + error.message);
    }
}

async function restoreFromCloud() {
    if (!currentUser) { showToast('请先登录'); return; }
    
    const binId = getUserBinId();
    if (!binId) {
        showToast('没有找到云端备份，请先在原设备点击「备份」');
        return;
    }
    
    const statusDiv = document.getElementById('cloudStatus');
    if (statusDiv) {
        statusDiv.classList.remove('hidden');
        statusDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在从云端恢复...';
    }
    
    try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
            headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        
        if (!response.ok) throw new Error('恢复失败，备份可能已过期');
        
        const result = await response.json();
        const cloudData = result.record;
        
        if (cloudData.username !== currentUser.username) {
            throw new Error(`云端数据属于账号 "${cloudData.username}"`);
        }
        
        const confirmMsg = `⚠️ 恢复将覆盖当前数据：\n• ${cloudData.data.coins} 金币\n• ${cloudData.data.favorites?.length || 0} 部追番\n• ${new Date(cloudData.timestamp).toLocaleString()} 备份\n\n确定恢复吗？`;
        
        if (!confirm(confirmMsg)) {
            if (statusDiv) statusDiv.classList.add('hidden');
            return;
        }
        
        // 恢复数据
        currentUser.coins = cloudData.data.coins;
        currentUser.membership_expire = cloudData.data.membership_expire;
        currentUser.signStreak = cloudData.data.signStreak;
        currentUser.lastSignDate = cloudData.data.lastSignDate;
        currentUser.avatar = cloudData.data.avatar;
        currentUser.bio = cloudData.data.bio;
        favorites = cloudData.data.favorites || [];
        watchHistory = cloudData.data.watchHistory || [];
        
        saveToLocal();
        updateUI();
        
        if (statusDiv) {
            statusDiv.innerHTML = '✅ 恢复成功！';
            setTimeout(() => statusDiv.classList.add('hidden'), 3000);
        }
        showToast(`☁️ 恢复成功！获得 ${cloudData.data.coins} 金币`);
        
    } catch (error) {
        console.error('恢复失败:', error);
        if (statusDiv) {
            statusDiv.innerHTML = '❌ 恢复失败';
            setTimeout(() => statusDiv.classList.add('hidden'), 3000);
        }
        showToast('恢复失败: ' + error.message);
    }
}

// ==================== 页面导航 ====================
function navigateTo(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(item => {
        if (item.dataset.page === pageId) item.classList.add('active');
        else item.classList.remove('active');
    });
    window.scrollTo(0, 0);
}

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', () => {
    loadUserData();
    
    // 导航
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => navigateTo(item.dataset.page));
    });
    document.querySelectorAll('.back-home').forEach(el => {
        el.addEventListener('click', () => navigateTo('homePage'));
    });
    
    // 登录注册
    document.getElementById('loginBtn')?.addEventListener('click', handleLogin);
    document.getElementById('registerBtn')?.addEventListener('click', handleRegister);
    document.querySelectorAll('.goto-login').forEach(el => {
        el.addEventListener('click', () => navigateTo('loginPage'));
    });
    document.querySelectorAll('.goto-register').forEach(el => {
        el.addEventListener('click', () => navigateTo('registerPage'));
    });
    document.getElementById('logoutBtnArea')?.addEventListener('click', handleLogout);
    document.getElementById('loginBtnArea')?.addEventListener('click', () => navigateTo('loginPage'));
    
    // 签到
    document.getElementById('checkinBtn')?.addEventListener('click', handleCheckin);
    
    // 云端同步
    document.getElementById('cloudBackupBtn')?.addEventListener('click', backupToCloud);
    document.getElementById('cloudRestoreBtn')?.addEventListener('click', restoreFromCloud);
});
</script>
</body>
</html>
